<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="OsGoogle - Personal Universal Operating System">
  <title>OsGoogle</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Status Bar -->
  <header id="status-bar" class="status-bar">
    <div class="status-left">
      <span id="status-time">--:--</span>
      <span id="status-date" style="margin-left: 8px; font-size: 12px; opacity: 0.8;">---</span>
    </div>
    <div class="status-right">
      <svg class="status-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg class="status-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3.55 18.54l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8zM11 22.45h2V19.5h-2v2.95zM4 10.5H1v2h3v-2zm9-9.95h-2v2.95h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.79 1.41-1.41-1.79-1.79-1.41 1.41zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16h2v-2h-2v2z"/></svg>
      <span id="battery-level">100%</span>
    </div>
  </header>

  <!-- Home Screen Container -->
  <main id="home-screen" class="home-screen">
    <!-- Page Container (swipeable) -->
    <div id="pages-container" class="pages-container">
      <!-- Pages will be generated dynamically -->
    </div>
    
    <!-- Page Indicators -->
    <div id="page-indicators" class="page-indicators"></div>
    
    <!-- Dock -->
    <nav id="dock" class="dock">
      <!-- Dock apps will be inserted here -->
    </nav>
  </main>

  <!-- Widgets Layer -->
  <section id="widgets-layer" class="widgets-layer">
    <!-- Widgets will be generated dynamically -->
  </section>

  <!-- Search Bar -->
  <div id="search-overlay" class="search-overlay hidden">
    <div class="search-container">
      <div class="search-bar">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#666" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="global-search-input" placeholder="Search or enter URL..." autocomplete="off">
        <button id="search-close-btn">✕</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- App Overlay (for fullscreen apps) -->
  <div id="app-overlay" class="app-overlay hidden">
    <div id="app-container" class="app-container">
      <header class="app-header">
        <button id="app-close-btn" class="app-btn">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <span id="app-title" class="app-title">App</span>
        <button id="app-back-btn" class="app-btn hidden">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
      </header>
      <div id="app-content" class="app-content"></div>
    </div>
  </div>

  <!-- Folder Overlay -->
  <div id="folder-overlay" class="folder-overlay hidden">
    <div class="folder-container">
      <div class="folder-header">
        <input type="text" id="folder-name" class="folder-name" value="Folder" maxlength="20">
      </div>
      <div id="folder-content" class="folder-content"></div>
      <button id="folder-close-btn" class="folder-close-btn">Done</button>
    </div>
  </div>

  <!-- Settings Panel (Slide up) -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-handle"></div>
    <div class="settings-content">
      <h2>Settings</h2>
      
      <div class="settings-group">
        <label>Wallpaper</label>
        <div class="wallpaper-options">
          <button class="wallpaper-btn active" data-wallpaper="default">Default</button>
          <button class="wallpaper-btn" data-wallpaper="gradient-blue">Blue Gradient</button>
          <button class="wallpaper-btn" data-wallpaper="gradient-purple">Purple Gradient</button>
          <button class="wallpaper-btn" data-wallpaper="gradient-sunset">Sunset</button>
          <button class="wallpaper-btn" data-wallpaper="dark">Dark</button>
        </div>
      </div>
      
      <div class="settings-group">
        <label>Layout</label>
        <button id="reset-layout-btn" class="settings-btn">Reset to Default</button>
      </div>
      
      <div class="settings-group">
        <label>Theme</label>
        <div class="theme-toggle">
          <button id="theme-toggle-btn" class="theme-btn">🌙 Dark Mode</button>
        </div>
      </div>
      
      <div class="settings-group">
        <label>About</label>
        <p class="settings-info">OsGoogle v1.0.0 - Personal Universal</p>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="context-menu hidden">
    <button class="context-item" data-action="edit">Edit Icon</button>
    <button class="context-item" data-action="delete">Delete</button>
    <button class="context-item" data-action="folder">Add to Folder</button>
  </div>

  <!-- Notification Center -->
  <div id="notification-center" class="notification-center hidden">
    <div class="notification-header">
      <h3>Notifications</h3>
      <button id="clear-notifications">Clear All</button>
    </div>
    <div id="notifications-list" class="notifications-list">
      <p class="no-notifications">No notifications</p>
    </div>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <p>Loading OsGoogle...</p>
  </div>

  <!-- Scripts - Load in order -->
  <script src="core/storage.js"></script>
  <script src="core/gestures.js"></script>
  <script src="core/widgets.js"></script>
  <script src="core/apps.js"></script>
  <script src="core/launcher.js"></script>
  <script src="app.js"></script>
  
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
